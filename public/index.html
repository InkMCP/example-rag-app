<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
    }
    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .sidebar-header p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    /* Upload area */
    .upload-area {
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    .drop-zone {
      border: 2px dashed #d0d0d0;
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .drop-zone p {
      font-size: 13px;
      color: #666;
    }
    .drop-zone p strong {
      color: #3b82f6;
    }
    .drop-zone .supported {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    /* Document list */
    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }
    .doc-list h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 8px;
    }
    .doc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      transition: background 0.15s;
    }
    .doc-item:hover {
      background: #f5f5f5;
    }
    .doc-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .doc-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .doc-delete:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .empty-state h2 {
      font-size: 18px;
      font-weight: 500;
      color: #666;
    }
    .empty-state p {
      font-size: 14px;
      margin-top: 6px;
    }

    .message {
      max-width: 720px;
      margin: 0 auto 20px;
    }
    .message-question {
      background: #3b82f6;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px 12px 4px 12px;
      margin-left: auto;
      max-width: 80%;
      width: fit-content;
      font-size: 14px;
      line-height: 1.5;
    }
    .message-answer {
      margin-top: 12px;
    }
    .answer-text {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .sources {
      margin-top: 8px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #eee;
    }
    .sources-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 6px;
    }
    .source-item {
      font-size: 12px;
      color: #666;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .source-item:last-child { border-bottom: none; }
    .source-file {
      font-weight: 600;
      color: #3b82f6;
    }

    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
    }
    .loading-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }
    .input-form {
      display: flex;
      gap: 8px;
      max-width: 720px;
      margin: 0 auto;
    }
    .input-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-form input:focus {
      border-color: #3b82f6;
    }
    .input-form button {
      padding: 12px 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-form button:hover {
      background: #2563eb;
    }
    .input-form button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    /* Upload status */
    .upload-status {
      padding: 8px 12px;
      margin-top: 8px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
    }
    .upload-status.success {
      background: #f0fdf4;
      color: #16a34a;
    }
    .upload-status.error {
      background: #fef2f2;
      color: #dc2626;
    }
    .upload-status.loading {
      background: #eff6ff;
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [documents, setDocuments] = useState([]);
      const [messages, setMessages] = useState([]);
      const [question, setQuestion] = useState('');
      const [loading, setLoading] = useState(false);
      const [uploadStatus, setUploadStatus] = useState(null);
      const [dragover, setDragover] = useState(false);
      const messagesEndRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        fetchDocuments();
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      async function fetchDocuments() {
        const res = await fetch('/api/documents');
        const data = await res.json();
        setDocuments(data);
      }

      async function handleUpload(file) {
        if (!file) return;
        setUploadStatus({ type: 'loading', text: `Uploading "${file.name}"...` });

        const formData = new FormData();
        formData.append('file', file);

        try {
          const res = await fetch('/api/documents', { method: 'POST', body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          setUploadStatus({ type: 'success', text: data.message });
          fetchDocuments();
        } catch (err) {
          setUploadStatus({ type: 'error', text: err.message });
        }

        setTimeout(() => setUploadStatus(null), 4000);
      }

      async function handleDelete(id) {
        await fetch(`/api/documents/${id}`, { method: 'DELETE' });
        fetchDocuments();
      }

      async function handleAsk(e) {
        e.preventDefault();
        if (!question.trim() || loading) return;

        const q = question.trim();
        setQuestion('');
        setMessages(prev => [...prev, { type: 'question', text: q }]);
        setLoading(true);

        try {
          const res = await fetch('/api/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          setMessages(prev => [...prev, {
            type: 'answer',
            text: data.answer,
            sources: data.sources
          }]);
        } catch (err) {
          setMessages(prev => [...prev, {
            type: 'answer',
            text: `Error: ${err.message}`,
            sources: []
          }]);
        } finally {
          setLoading(false);
        }
      }

      function handleDrop(e) {
        e.preventDefault();
        setDragover(false);
        const file = e.dataTransfer.files[0];
        if (file) handleUpload(file);
      }

      return (
        <div className="app">
          <div className="sidebar">
            <div className="sidebar-header">
              <h1>RAG App</h1>
              <p>Upload documents, ask questions</p>
            </div>

            <div className="upload-area">
              <div
                className={`drop-zone ${dragover ? 'dragover' : ''}`}
                onClick={() => fileInputRef.current?.click()}
                onDragOver={(e) => { e.preventDefault(); setDragover(true); }}
                onDragLeave={() => setDragover(false)}
                onDrop={handleDrop}
              >
                <p><strong>Click to upload</strong> or drag & drop</p>
                <p className="supported">.txt, .md, .pdf (max 10 MB)</p>
              </div>
              <input
                ref={fileInputRef}
                type="file"
                accept=".txt,.md,.pdf"
                hidden
                onChange={(e) => handleUpload(e.target.files[0])}
              />
              {uploadStatus && (
                <div className={`upload-status ${uploadStatus.type}`}>
                  {uploadStatus.text}
                </div>
              )}
            </div>

            <div className="doc-list">
              <h3>Documents ({documents.length})</h3>
              {documents.map(doc => (
                <div key={doc.id} className="doc-item">
                  <span className="doc-name">{doc.filename}</span>
                  <button
                    className="doc-delete"
                    onClick={() => handleDelete(doc.id)}
                    title="Delete"
                  >
                    &times;
                  </button>
                </div>
              ))}
              {documents.length === 0 && (
                <p style={{ fontSize: 13, color: '#999' }}>No documents yet</p>
              )}
            </div>
          </div>

          <div className="main">
            <div className="messages">
              {messages.length === 0 && !loading && (
                <div className="empty-state">
                  <div className="icon">💬</div>
                  <h2>Ask a question</h2>
                  <p>Upload a document and ask questions about it</p>
                </div>
              )}

              {messages.map((msg, i) => (
                <div key={i} className="message">
                  {msg.type === 'question' && (
                    <div className="message-question">{msg.text}</div>
                  )}
                  {msg.type === 'answer' && (
                    <div className="message-answer">
                      <div className="answer-text">{msg.text}</div>
                      {msg.sources && msg.sources.length > 0 && (
                        <div className="sources">
                          <div className="sources-title">Sources</div>
                          {msg.sources.map((src, j) => (
                            <div key={j} className="source-item">
                              <span className="source-file">{src.filename}</span>
                              {' — '}{src.text}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}

              {loading && (
                <div className="loading">
                  <div className="loading-dots">
                    <span></span> <span></span> <span></span>
                  </div>
                </div>
              )}

              <div ref={messagesEndRef} />
            </div>

            <div className="input-area">
              <form className="input-form" onSubmit={handleAsk}>
                <input
                  type="text"
                  value={question}
                  onChange={(e) => setQuestion(e.target.value)}
                  placeholder="Ask a question about your documents..."
                  disabled={loading}
                />
                <button type="submit" disabled={loading || !question.trim()}>
                  Ask
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
